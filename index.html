<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Prahlad Regmi</title>
    <meta http-equiv="refresh" content="3;url=index.html">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: white;
            text-align: center;
        }
        .container { padding: 2rem; }
        .icon {
            width: 80px; height: 80px; background: #10B981;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease-out;
        }
        .icon svg { width: 40px; height: 40px; color: white; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; font-weight: 700; }
        p { font-size: 1.125rem; color: #94A3B8; margin-bottom: 2rem; }
        .loader { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 0 auto; overflow: hidden; }
        .loader-bar { height: 100%; background: #3B82F6; width: 0%; animation: load 3s ease-out forwards; }
        .redirect-text { margin-top: 1rem; font-size: 0.875rem; color: #64748B; }
        @keyframes scaleIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        @media (prefers-color-scheme: light) {
            body { background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%); color: #0F172A; }
            p { color: #475569; } .redirect-text { color: #64748B; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1>Thanks for your message!</h1>
        <p>I'll get back to you as soon as possible.</p>
        <div class="loader"><div class="loader-bar"></div></div>
        <p class="redirect-text">Redirecting to homepage...</p>
    </div>
</body>
</html>
